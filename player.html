<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Game | DrivingVerse</title>
  <meta name="description" content="Play any DrivingVerse game in full-screen mode with the universal player." />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <style>
    :root { color-scheme: dark; }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; height: 100%; background: #000; color: #fff; font-family: 'Poppins', Arial, sans-serif; }
    body { overflow: hidden; }
    .player-shell { position: relative; width: 100%; height: 100%; }
    .player-frame { position: absolute; inset: 0; background: #000; display: grid; place-items: center; }
    .player-frame iframe { width: 100%; height: 100%; border: 0; }
    .player-panel { position: absolute; left: 50%; bottom: 1.5rem; transform: translateX(-50%); width: min(1120px, calc(100% - 2rem)); background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 1.25rem 1.5rem; backdrop-filter: blur(24px); }
    .player-panel h1 { margin: 0 0 0.5rem; font-size: clamp(1.75rem, 2.5vw, 2.75rem); line-height: 1.05; }
    .player-panel p { margin: 0 0 1rem; color: #d1d5db; line-height: 1.7; }
    .player-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .button, .back-button { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; border: 0; padding: 0.95rem 1.3rem; font-weight: 700; text-decoration: none; cursor: pointer; }
    .button { background: #2563eb; color: #fff; }
    .back-button { position: absolute; top: 1rem; left: 1rem; background: rgba(15, 23, 42, 0.92); color: #fff; z-index: 10; }
    .error-state { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; gap: 1rem; padding: 2rem; background: #000; }
    .error-state h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); }
    .error-state p { margin: 0; color: #d1d5db; }
    @media (max-width: 720px) {
      .player-panel { bottom: 1rem; width: calc(100% - 1.5rem); padding: 1rem; }
      .player-panel h1 { font-size: 1.8rem; }
      .back-button { top: 0.75rem; left: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="player-shell">
    <button class="back-button" id="backButton" type="button">← Back</button>
    <div class="player-frame" id="playerFrame">
      <div class="error-state" id="errorState" hidden>
        <h1>Game not found</h1>
        <p>Choose a game from the homepage or open a game detail page first.</p>
        <a class="button" href="index.html">Return home</a>
      </div>
    </div>
    <div class="player-panel" id="playerPanel" hidden>
      <h1 id="playerTitle">Loading...</h1>
      <p id="playerDescription"></p>
      <div class="player-actions">
        <button class="button" id="loadButton" type="button">PLAY GAME</button>
        <a class="button" id="openDetailButton" href="#">View game details</a>
      </div>
    </div>
  </div>
  <script src="js/games-data.js"></script>
  <script>
    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function normalizeSlug(value) {
      return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const backButton = document.getElementById('backButton');
      const playerFrame = document.getElementById('playerFrame');
      const playerPanel = document.getElementById('playerPanel');
      const errorState = document.getElementById('errorState');
      const loadButton = document.getElementById('loadButton');
      const playerTitle = document.getElementById('playerTitle');
      const playerDescription = document.getElementById('playerDescription');
      const openDetailButton = document.getElementById('openDetailButton');

      backButton.addEventListener('click', () => window.history.back());

      const requestedSlug = getQueryParam('game') || getQueryParam('slug') || getQueryParam('id');
      const game = (window.games || []).find((item) => {
        return item.slug === requestedSlug || item.id === requestedSlug || normalizeSlug(item.title) === normalizeSlug(requestedSlug);
      });

      if (!game) {
        errorState.hidden = false;
        playerPanel.hidden = true;
        return;
      }

      const referrerUrl = document.referrer || `${window.location.origin}/games/${game.slug}.html`;
      const baseUrl = game.url || '';
      const iframeUrl = baseUrl ? baseUrl + (baseUrl.includes('?') ? '&' : '?') + 'gd_sdk_referrer_url=' + encodeURIComponent(referrerUrl) : '';

      const hasPlayableUrl = Boolean(baseUrl);
      playerTitle.textContent = game.title || 'DrivingVerse Game';
      playerDescription.textContent = game.description || 'Launch your game in a simple full-screen player.';
      openDetailButton.href = `games/${game.slug}.html`;
      openDetailButton.textContent = 'View game details';
      loadButton.disabled = !hasPlayableUrl;
      loadButton.textContent = hasPlayableUrl ? 'PLAY GAME' : 'Unavailable';
      loadButton.title = hasPlayableUrl ? 'Load the game in the player' : 'Playable URL is missing for this game';
      playerPanel.hidden = false;

      loadButton.addEventListener('click', () => {
        if (!hasPlayableUrl || !iframeUrl) return;
        const iframe = document.createElement('iframe');
        iframe.src = iframeUrl;
        iframe.allowFullscreen = true;
        iframe.allow = 'fullscreen';
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
        iframe.title = `${game.title || 'DrivingVerse'} gameplay`;
        playerFrame.innerHTML = '';
        playerFrame.appendChild(iframe);
        loadButton.hidden = true;
      });
    });
  </script>
</body>
</html>
