<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Racer - Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
        }
        canvas {
            border: 2px solid #ff6b00;
            background: #111;
        }
        .debug {
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            background: #222;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🏎️ Speed Racer - Debug Test</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="debug">
        <div id="debugOutput">Initializing...</div>
    </div>

    <script>
        function log(message) {
            console.log(message);
            const output = document.getElementById('debugOutput');
            output.innerHTML += '<br>' + message;
        }

        // Test basic canvas functionality
        log('🔧 Starting debug test...');
        
        const canvas = document.getElementById('gameCanvas');
        log('📱 Canvas element: ' + (canvas ? 'Found' : 'NOT FOUND'));
        
        if (canvas) {
            const ctx = canvas.getContext('2d');
            log('🎨 Canvas context: ' + (ctx ? 'Created' : 'FAILED'));
            
            if (ctx) {
                log('🏁 Canvas size: ' + canvas.width + 'x' + canvas.height);
                
                // Test basic drawing
                try {
                    ctx.fillStyle = '#ff6b00';
                    ctx.fillRect(50, 50, 100, 100);
                    log('✅ Basic rectangle drawn');
                    
                    // Test rounded corners with fallback
                    ctx.fillStyle = '#00ff88';
                    
                    if (typeof ctx.roundRect === 'function') {
                        ctx.beginPath();
                        ctx.roundRect(200, 50, 100, 100, 10);
                        ctx.fill();
                        log('✅ roundRect() method available');
                    } else {
                        // Fallback for browsers without roundRect
                        ctx.fillRect(200, 50, 100, 100);
                        log('⚠️ roundRect() NOT available - using fallback');
                    }
                    
                    // Test text
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '20px Arial';
                    ctx.fillText('Canvas Working!', 50, 200);
                    log('✅ Text rendered');
                    
                    // Test car shape drawing
                    ctx.save();
                    ctx.translate(400, 300);
                    ctx.fillStyle = '#ff3333';
                    
                    // Simple car shape without roundRect
                    ctx.fillRect(-10, -20, 20, 40);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(-8, -18, 16, 36);
                    
                    ctx.restore();
                    log('✅ Car shape test complete');
                    
                } catch (error) {
                    log('❌ Drawing error: ' + error.message);
                }
            }
        }
        
        // Test script loading
        log('📜 Testing script dependencies...');
        
        // Check if our classes exist
        setTimeout(() => {
            if (typeof Car !== 'undefined') {
                log('✅ Car class loaded');
            } else {
                log('❌ Car class NOT loaded');
            }
            
            if (typeof Track !== 'undefined') {
                log('✅ Track class loaded');
            } else {
                log('❌ Track class NOT loaded');
            }
            
            if (typeof Game !== 'undefined') {
                log('✅ Game class loaded');
            } else {
                log('❌ Game class NOT loaded');
            }
        }, 100);
    </script>
    
    <!-- Load game scripts with error handling -->
    <script>
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    log(`✅ ${src} loaded successfully`);
                    resolve();
                };
                script.onerror = (error) => {
                    log(`❌ Failed to load ${src}: ${error.message}`);
                    reject(error);
                };
                document.head.appendChild(script);
            });
        }

        // Load scripts in sequence with error handling
        loadScript('car.js').then(() => {
            return loadScript('track.js');
        }).then(() => {
            return loadScript('game.js');
        }).then(() => {
            log('📜 All scripts loaded, checking classes again...');
            setTimeout(() => {
                if (typeof Car !== 'undefined') {
                    log('✅ Car class available after sequential loading');
                } else {
                    log('❌ Car class still not available');
                }
                
                if (typeof Track !== 'undefined') {
                    log('✅ Track class available after sequential loading');
                } else {
                    log('❌ Track class still not available');
                }
                
                if (typeof Game !== 'undefined') {
                    log('✅ Game class available after sequential loading');
                } else {
                    log('❌ Game class still not available');
                }
            }, 100);
        }).catch(error => {
            log('❌ Script loading failed: ' + error.message);
        });
    </script>
</body>
</html>
