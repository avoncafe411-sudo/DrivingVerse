<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Extreme Car Driving Simulator | DrivingVerse</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
font-family:Poppins,sans-serif;
margin:0;
background:#111827;
color:#fff;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.game-image{
width:100%;
max-width:700px;
display:block;
margin:auto;
border-radius:15px;
}

h1{
text-align:center;
margin-top:25px;
}

.play-btn{
display:block;
width:250px;
margin:30px auto;
padding:18px;
background:#ff4d00;
color:#fff;
text-align:center;
font-size:22px;
font-weight:bold;
text-decoration:none;
border-radius:12px;
}

.play-btn:hover{
background:#ff6a00;
}

.info{
margin-top:40px;
background:#1f2937;
padding:25px;
border-radius:15px;
line-height:1.8;
}
</style>

</head>

<body>

<div class="container">

<img
class="game-image"
src="https://img.gamemonetize.com/wtmr1ws4khywnki9fm53csa0txss21tb/512x384.jpg">

<h1>Extreme Car Driving Simulator</h1>

<a
class="play-btn"
href="#"
id="playGameButton">
PLAY GAME
</a>

<div class="info">

<h2>Description</h2>

<p>
Extreme Car Driving Simulator is recommended as a hard-core car driving simulation game. Explore the city, complete missions and drive powerful sports cars.
</p>

<h2>Controls</h2>

<p>
Mouse click or tap to play.
</p>

</div>

</div>

<script>
document.getElementById("playGameButton").addEventListener("click", function(e){

e.preventDefault();

document.querySelector(".game-frame").innerHTML = `
<iframe
src="https://html5.gamemonetize.co/wtmr1ws4khywnki9fm53csa0txss21tb/"
width="100%"
height="700"
frameborder="0"
allowfullscreen
scrolling="no">
</iframe>
`;

});
</script>
</body>
</html>
