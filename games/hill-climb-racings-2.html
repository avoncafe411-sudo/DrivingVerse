<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>HIll climb Racings 2 | DrivingVerse</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
    font-family:Poppins,sans-serif;
    margin:0;
    background:#111827;
    color:#fff;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

#gameContainer{
    width:100%;
}

.game-image{
    width:100%;
    max-width:900px;
    display:block;
    margin:auto;
    border-radius:15px;
}

.game-title{
    text-align:center;
    margin:25px 0;
}

.play-btn{
    display:block;
    width:260px;
    margin:25px auto;
    padding:18px;
    background:#ff4d00;
    color:#fff;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    border-radius:12px;
}

.play-btn:hover{
    background:#ff6a00;
}

.game-player{
    width:100%;
    aspect-ratio:16/9;
}

.game-player iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:15px;
}

.info{
    margin-top:40px;
    background:#1f2937;
    padding:25px;
    border-radius:15px;
    line-height:1.8;
}
</style>

</head>

<body>

<div class="container">

<div id="gameContainer">

<img
class="game-image"
src="https://img.gamemonetize.com/1vxk8rfmkpin0l0ex7atiuftp6l3mu6p/512x384.jpg"
alt="HIll climb Racings 2">

<h1 class="game-title">
HIll climb Racings 2
</h1>

<a
href="#"
class="play-btn"
id="playGameButton">
PLAY GAME
</a>

</div>

<div class="info">

<h2>Description</h2>

<p>
Hill Climb Racings 2 is back, bigger, better and even more fun. Race across challenging hills, master realistic physics, unlock vehicles, and enjoy exciting adventures with smooth gameplay.
</p>

<h2>Controls</h2>

<p>
Mouse click or tap to play.
</p>

</div>

</div>

<script>

const playButton=document.getElementById("playGameButton");

playButton.addEventListener("click",function(e){

e.preventDefault();

document.getElementById("gameContainer").innerHTML=`

<div class="game-player">

<iframe
src="https://html5.gamemonetize.co/1vxk8rfmkpin0l0ex7atiuftp6l3mu6p/"
allowfullscreen
scrolling="no">
</iframe>

</div>

`;

});

</script>

</body>
</html>
